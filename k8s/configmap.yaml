apiVersion: v1
kind: ConfigMap
metadata:
  name: beta-code-config
  namespace: beta-code
data:
  # Services communicate via Kubernetes DNS (service-name.namespace.svc.cluster.local)
  DATABASE_URL: "postgres://postgres:postgres@postgres.beta-code.svc.cluster.local:5432/beta_code"
  REDIS_URL: "redis://redis.beta-code.svc.cluster.local:6379"
  FRONTEND_URL: "http://frontend.beta-code.svc.cluster.local:4321"
  JOBS_BASE: "/app/runner/jobs"
  CONCURRENCY: "10"
