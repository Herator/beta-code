# KEDA (Kubernetes Event-Driven Autoscaler) scales the runner based on the
# number of pending submissions in the BullMQ Redis queue.
#
# Install KEDA first:
#   kubectl apply --server-side -f https://github.com/kedacore/keda/releases/download/v2.15.0/keda-2.15.0.yaml
#
# How it works:
#   - When the "bull:submissions:wait" Redis list has jobs, KEDA scales up the runner.
#   - 1 runner replica is added for every `listLength` (3) pending jobs.
#   - When the queue is empty, the runner scales down to 0 (no idle cost).
#   - Max 10 runner replicas prevent resource exhaustion under heavy load.
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: runner-scaledobject
  namespace: beta-code
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: runner
  pollingInterval: 5       # Check queue depth every 5 seconds
  cooldownPeriod: 60       # Wait 60 s of idle queue before scaling to 0
  minReplicaCount: 0       # Scale to 0 when no submissions are queued
  maxReplicaCount: 10      # Hard cap on concurrent runner pods
  triggers:
    - type: redis
      metadata:
        # Redis address using Kubernetes DNS
        address: redis.beta-code.svc.cluster.local:6379
        # BullMQ stores waiting jobs in this Redis list
        listName: "bull:submissions:wait"
        # Scale: 1 runner per 3 pending jobs
        listLength: "3"
